# Cloud Build configuration for building & deploying solo el frontend
# Útil cuando no quieres subir el backend al contenedor o simplemente quieres
# automatizar únicamente la parte de Vue en Cloud Run.

steps:
  # construir y empujar imagen frontend
  - name: 'gcr.io/cloud-builders/docker'
    # el contexto se pasa explícitamente para evitar problemas con el directorio
    args: ['build','-t','gcr.io/$PROJECT_ID/alumnos-frontend:$SHORT_SHA','front_alumnos']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push','gcr.io/$PROJECT_ID/alumnos-frontend:$SHORT_SHA']

  # desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy alumnos-frontend \
          --image=gcr.io/$PROJECT_ID/alumnos-frontend:$SHORT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated

images:
  - 'gcr.io/$PROJECT_ID/alumnos-frontend:$SHORT_SHA'
